name: Deploy to SAP BTP Cloud Foundry

on:
  push:
    branches:
      - main          # trigger on every push to main

  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: CF Push
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install CF CLI ───────────────────────────────────────────────────
      - name: Install Cloud Foundry CLI (v8)
        run: |
          curl -fsSL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github" \
            -o /tmp/cf-cli.tgz
          tar -xzf /tmp/cf-cli.tgz -C /tmp
          sudo mv /tmp/cf8 /usr/local/bin/cf
          cf version

      # ── 3. Authenticate via oauth token (for SSO accounts) ─────────────────
      - name: Authenticate with SAP BTP
        env:
          CF_API:   ${{ secrets.CF_API }}
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          CF_ORG:   ${{ secrets.CF_ORG }}
          CF_SPACE: ${{ secrets.CF_SPACE }}
        run: |
          cf api "$CF_API"
          mkdir -p ~/.cf
          printf '{"Target":"%s","AccessToken":"%s","RefreshToken":"","OrganizationFields":{"Name":"%s"},"SpaceFields":{"Name":"%s"}}' \
            "$CF_API" "$CF_TOKEN" "$CF_ORG" "$CF_SPACE" > ~/.cf/config.json
          cf target -o "$CF_ORG" -s "$CF_SPACE"

      # ── 4. Deploy ───────────────────────────────────────────────────────────
      - name: Deploy static app
        run: cf push --strategy rolling

      # ── 5. Print URL ────────────────────────────────────────────────────────
      - name: Show app URL
        run: cf app static-btp-app
