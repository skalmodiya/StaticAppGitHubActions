name: Deploy to SAP BTP Cloud Foundry

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    name: CF Push
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install CF CLI ───────────────────────────────────────────────────
      - name: Install Cloud Foundry CLI (v8)
        run: |
          curl -fsSL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github" \
            -o /tmp/cf-cli.tgz
          tar -xzf /tmp/cf-cli.tgz -C /tmp
          sudo mv /tmp/cf8 /usr/local/bin/cf
          cf version

      # ── 3. Authenticate via CF config + fresh token (for SSO accounts) ─────
      - name: Authenticate with SAP BTP
        env:
          CF_TOKEN:  ${{ secrets.CF_TOKEN }}
          CF_CONFIG: ${{ secrets.CF_CONFIG }}
          CF_ORG:    ${{ secrets.CF_ORG }}
          CF_SPACE:  ${{ secrets.CF_SPACE }}
        run: |
          mkdir -p ~/.config/cf
          echo "$CF_CONFIG" > ~/.config/cf/config.json
          jq --arg token "$CF_TOKEN" '.AccessToken = $token' ~/.config/cf/config.json \
            > /tmp/cf_config_patched.json
          mv /tmp/cf_config_patched.json ~/.config/cf/config.json
          cf target -o "$CF_ORG" -s "$CF_SPACE"

      # ── 4. Deploy ───────────────────────────────────────────────────────────
      - name: Deploy static app
        run: cf push --strategy rolling

      # ── 5. Print URL ────────────────────────────────────────────────────────
      - name: Show app URL
        run: cf app static-btp-app
