name: Deploy to SAP BTP Cloud Foundry

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    name: CF Push
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install CF CLI ───────────────────────────────────────────────────
      - name: Install Cloud Foundry CLI (v8)
        run: |
          curl -fsSL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github" \
            -o /tmp/cf-cli.tgz
          tar -xzf /tmp/cf-cli.tgz -C /tmp
          sudo mv /tmp/cf8 /usr/local/bin/cf
          cf version

      # ── 3. Authenticate via CF config + fresh token (for SSO accounts) ─────
      - name: Authenticate with SAP BTP
        env:
          CF_TOKEN:  ${{ secrets.CF_TOKEN }}
          CF_CONFIG: ${{ secrets.CF_CONFIG }}
          CF_ORG:    ${{ secrets.CF_ORG }}
          CF_SPACE:  ${{ secrets.CF_SPACE }}
        run: |
          CF_CONFIG_PATH=$(find "$HOME" -name "config.json" 2>/dev/null | grep -i cf | head -1)
          if [ -z "$CF_CONFIG_PATH" ]; then
            mkdir -p "$HOME/.cf"
            CF_CONFIG_PATH="$HOME/.cf/config.json"
          fi
          echo "$CF_CONFIG" > "$CF_CONFIG_PATH"
          jq --arg token "$CF_TOKEN" '.AccessToken = $token' "$CF_CONFIG_PATH" \
            > /tmp/cf_config_patched.json
          mv /tmp/cf_config_patched.json "$CF_CONFIG_PATH"
          cf target -o "$CF_ORG" -s "$CF_SPACE"

      # ── 4. Create XSUAA service (skips if already exists) ──────────────────
      - name: Create XSUAA service
        run: |
          if cf service xsuaa-static-app > /dev/null 2>&1; then
            echo "xsuaa-static-app already exists, skipping"
          else
            cf create-service xsuaa application xsuaa-static-app \
              -c xs-security.json
            echo "Waiting for xsuaa-static-app to be ready..."
            for i in $(seq 1 12); do
              STATUS=$(cf service xsuaa-static-app | grep -i "status:" | awk '{print $2}')
              echo "  status: $STATUS"
              [ "$STATUS" = "succeeded" ] && break || sleep 10
            done
          fi

      # ── 5. Install App Router dependencies ─────────────────────────────────
      - name: Install App Router npm packages
        working-directory: approuter
        run: npm install --omit=dev

      # ── 6. Deploy static app (no public route) ─────────────────────────────
      - name: Deploy static app
        working-directory: static-app
        run: cf push --strategy rolling

      # ── 7. Deploy App Router ────────────────────────────────────────────────
      - name: Deploy App Router
        working-directory: approuter
        run: cf push --strategy rolling

      # ── 8. Print App Router URL ─────────────────────────────────────────────
      - name: Show App Router URL
        run: cf app static-btp-approuter
